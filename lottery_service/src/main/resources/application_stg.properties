spring.application.name=auth
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# db setting
# write
spring.datasource.write.jdbc-url=
spring.datasource.write.username=
spring.datasource.write.password=
spring.datasource.write.driver-class-name=
spring.datasource.write.hikari.maximum-pool-size=

# read
spring.datasource.readonly.jdbc-url=
spring.datasource.readonly.username=
spring.datasource.readonly.password=
spring.datasource.readonly.driver-class-name=
spring.datasource.readonly.hikari.maximum-pool-size=

# ===================================================================
# Redis 基本連線設定
# ===================================================================
spring.data.redis.host=
spring.data.redis.port=
spring.data.redis.password=
spring.data.redis.database=

# ===================================================================
# 連線池設定 (Spring Boot 4 預設使用 Lettuce)
# ===================================================================
spring.data.redis.lettuce.pool.max-active=
spring.data.redis.lettuce.pool.max-idle=
spring.data.redis.lettuce.pool.min-idle=
spring.data.redis.lettuce.pool.max-wait=
spring.data.redis.lettuce.shutdown-timeout=

# ===================================================================
# 序列化設定 (告知 Spring Boot 優先使用 JSON)
# ===================================================================
spring.mvc.format.date-time=

# redis key prefix
redis.prefix.hashtag=
redis.prefix.key.campaign=
redis.prefix.key.campaign.itemlist=
redis.prefix.key.lottery.count=

# token
jwt.secret=