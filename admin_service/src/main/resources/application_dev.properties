spring.application.name=auth
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# db setting
# write
spring.datasource.write.jdbc-url=jdbc:mysql://localhost:3306/lucky_draw?useSSL=false
spring.datasource.write.username=root
spring.datasource.write.password=mypassword
spring.datasource.write.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.write.hikari.maximum-pool-size=10

# read
spring.datasource.readonly.jdbc-url=jdbc:mysql://localhost:3306/lucky_draw?useSSL=false
spring.datasource.readonly.username=root
spring.datasource.readonly.password=mypassword
spring.datasource.readonly.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.readonly.hikari.maximum-pool-size=10

# ===================================================================
# Redis 基本連線設定
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=password
spring.data.redis.database=0

# ===================================================================
# 連線池設定 (Spring Boot 4 預設使用 Lettuce)
# ===================================================================
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# ===================================================================
# 序列化設定 (告知 Spring Boot 優先使用 JSON)
# ===================================================================
spring.mvc.format.date-time=iso

# redis key prefix
redis.prefix.hashtag=campaign_
redis.prefix.key.campaign=campaign_
redis.prefix.key.campaign.itemlist=campaign_itemlist_
redis.prefix.key.lottery.count=lottery_count_

# token
jwt.secret=your-256-bit-secret-key-at-least-32-characters-long